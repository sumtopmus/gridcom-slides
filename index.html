<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentations</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/index.css" />
  <!-- Apply stored color mode before first paint to prevent dark/light flash -->
  <script>
    (function () {
      var m = localStorage.getItem('colorMode')
      document.documentElement.classList.add(
        m === 'light' || m === 'system' ? 'theme-' + m : 'theme-dark'
      )
      document.documentElement.style.setProperty(
        '--theme-index',
        m === 'light' ? '0' : m === 'system' ? '1' : '2'
      )
    })()
  </script>
</head>

<body>
  <header class="site-header">
    <div>
      <h1>Presentations</h1>
      <p>HTML slide decks — open, click or use arrow keys to navigate</p>
    </div>
    <div class="presentation-count" id="presentation-count"></div>
  </header>

  <main>
    <div class="presentations-grid" id="presentations-grid"></div>
  </main>

  <div id="kbd-hint" class="hidden">
    <div class="kbd-row"><kbd>m</kbd> Light / dark</div>
    <div class="kbd-row"><kbd>s</kbd> System mode</div>
    <div class="kbd-row"><kbd>h</kbd> Help panel</div>
  </div>

  <div id="bottom-bar">
    <div id="theme-switch" title="Color mode">
      <span id="theme-thumb"></span>
      <button class="theme-opt" data-mode="light" title="Light">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
      <button class="theme-opt" data-mode="system" title="System">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
      </button>
      <button class="theme-opt" data-mode="dark" title="Dark">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </div>
    <button id="btn-help" class="icon-btn" title="Keyboard shortcuts (h)">?</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
