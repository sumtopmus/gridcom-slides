<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUROC — Dataset</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pos: #fb923c;
      --neg: #a78bfa;
      --pos-a: rgba(251, 146, 60, 0.13);
      --neg-a: rgba(167, 139, 250, 0.13);
      --theme-color-muted: #a1a1aa;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 2.5rem;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    .title {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--theme-color-muted);
      margin-top: 0.35rem;
    }

    .header {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 54px);
      gap: 0.45rem 0.7rem;
    }

    .dp {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .dp-sym {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      opacity: 0;
      transform: scale(0.55);
      transition: transform 0.22s cubic-bezier(.34, 1.56, .64, 1), opacity 0.18s ease;
    }

    .dp-sym.pos {
      background: var(--pos-a);
      border-color: var(--pos);
      color: var(--pos);
    }

    .dp-sym.neg {
      background: var(--neg-a);
      border-color: var(--neg);
      color: var(--neg);
    }

    .dp-sym.shown {
      opacity: 1;
      transform: scale(1);
    }

    .dp-id {
      font-size: 0.54rem;
      color: var(--theme-color-muted);
      font-variant-numeric: tabular-nums;
      opacity: 0;
      transition: opacity 0.16s ease 0.08s;
    }

    .dp-sym.shown+.dp-id {
      opacity: 1;
    }

    .legend {
      display: flex;
      gap: 2.5rem;
      align-items: center;
      font-size: 1rem;
      color: var(--theme-color-muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .legend-sym {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* ── Dataset switcher ── */
    .ds-switcher {
      position: fixed;
      top: 1.5rem;
      right: 1.8rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.4rem;
    }

    .ds-btns {
      position: relative;
      display: flex;
      gap: 0.3rem;
    }

    .ds-btn {
      width: 2rem;
      height: 2rem;
      border-radius: 6px;
      border: 1.5px solid var(--theme-border);
      background: transparent;
      color: var(--theme-color-muted);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      transition: color 0.15s;
    }

    .ds-btn:hover:not(.active) {
      color: var(--theme-color);
    }

    .ds-btn.active {
      border-color: transparent;
      color: var(--theme-accent);
    }

    .ds-indicator {
      position: absolute;
      left: 0;
      top: 0;
      width: 2rem;
      height: 2rem;
      border-radius: 6px;
      border: 1.5px solid var(--theme-accent);
      background: rgba(99, 102, 241, 0.12);
      pointer-events: none;
    }

    .ds-legend {
      font-size: 0.63rem;
      color: var(--theme-color-muted);
      text-align: left;
      line-height: 1.7;
      opacity: 0.8;
      padding-left: 0.3rem;
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="ds-switcher">
    <div class="ds-btns">
      <div class="ds-indicator"></div>
      <button class="ds-btn" data-idx="0">A</button>
      <button class="ds-btn" data-idx="1">B</button>
      <button class="ds-btn" data-idx="2">C</button>
    </div>
    <div class="ds-legend">A – High score<br>B – Regular score<br>C – Low score</div>
  </div>
  <script>(function () { var i = parseInt(localStorage.getItem('auroc_dsIdx') || '0'); document.querySelectorAll('.ds-btn').forEach(function (b) { b.classList.toggle('active', +b.dataset.idx === i) }); var ind = document.querySelector('.ds-indicator'); if (ind) { ind.style.transition = 'none'; ind.style.transform = 'translateX(calc(' + i + '*(2rem + 0.3rem)))'; }; })()</script>

  <div class="content">
    <div class="header">
      <div class="title">The Datasets</div>
      <div class="subtitle">100 labeled samples — the classifier has assigned each a score ∈ [0, 1]</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-sym" style="border-color:var(--pos);color:var(--pos)">●</div>
        <span>Positive class (50 samples)</span>
      </div>
      <div class="legend-item">
        <div class="legend-sym" style="border-color:var(--neg);color:var(--neg)">×</div>
        <span>Negative class (50 samples)</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { datasets } from './datasets.js'

    const grid = document.getElementById('grid')

    function render(data) {
      grid.innerHTML = ''
      for (const d of data) {
        const dp = document.createElement('div')
        dp.className = 'dp'
        dp.innerHTML = `<div class="dp-sym ${d.label === 1 ? 'pos' : 'neg'}">${d.label === 1 ? '●' : '×'}</div><div class="dp-id">S${String(d.id).padStart(3, '0')}</div>`
        grid.appendChild(dp)
      }
      document.querySelectorAll('.dp-sym').forEach((el, i) => {
        setTimeout(() => el.classList.add('shown'), 20 + i * 14)
      })
    }

    let dsIdx = 0
    const swBtns = document.querySelectorAll('.ds-btn')

    const ind = document.querySelector('.ds-indicator')

    function applyIdx(idx, animate = false) {
      dsIdx = idx
      localStorage.setItem('auroc_dsIdx', idx)
      swBtns.forEach(b => b.classList.toggle('active', +b.dataset.idx === idx))
      ind.style.transition = animate ? 'transform 0.22s cubic-bezier(0.34,1.56,0.64,1)' : 'none'
      ind.style.transform = `translateX(calc(${idx} * (2rem + 0.3rem)))`
      render(datasets[idx].data)
    }

    swBtns.forEach(btn => {
      btn.addEventListener('click', () => applyIdx(+btn.dataset.idx, true))
    })

    applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
    window.addEventListener('message', e => {
      if (e.data?.type === 'slideEnter') applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
    })
  </script>
</body>

</html>
