<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: #09090b;
      color: #fafafa;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .content {
      max-width: 720px;
      width: 100%;
    }

    h2 {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #d4d4d8;
      line-height: 1.5;
    }

    li::before {
      content: '→';
      color: #6366f1;
      flex-shrink: 0;
      margin-top: 0.1em;
    }
  </style>
</head>
<body>
  <div class="content">
    <h2>Section heading</h2>
    <ul>
      <li>First bullet point goes here</li>
      <li>Second bullet point goes here</li>
      <li>Third bullet point goes here</li>
    </ul>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        // Animate list items in
      }
    })
  </script>
</body>
</html>
