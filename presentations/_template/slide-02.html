<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 2</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <style>

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
    }

    h2 {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--theme-color-secondary);
      line-height: 1.5;
    }

    li::before {
      content: '→';
      color: var(--theme-accent);
      flex-shrink: 0;
      margin-top: 0.1em;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content">
    <h2>Section heading</h2>
    <ul>
      <li>First bullet point goes here</li>
      <li>Second bullet point goes here</li>
      <li>Third bullet point goes here</li>
    </ul>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        // e.data.direction: 'forward' | 'backward' | 'initial'
        // trigger enter animations here
      }
    })
  </script>
</body>
</html>
