<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: #09090b;
      color: #fafafa;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .content {
      text-align: center;
      max-width: 720px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: #71717a;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Talk Title</h1>
    <p class="subtitle">Your subtitle goes here</p>
  </div>

  <script>
    // The viewer sends a 'slideEnter' message when this slide becomes active.
    // Use it to trigger animations.
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        // e.data.direction: 'forward' | 'backward' | 'initial'
        console.log('Slide entered', e.data)
      }
      if (e.data?.type === 'slideExit') {
        console.log('Slide exited', e.data)
      }
    })
  </script>
</body>
</html>
