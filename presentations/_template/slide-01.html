<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 1</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <link rel="stylesheet" href="../../shared/styles/slide-grid.css" />
  <style>

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--theme-color-muted);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <!-- Main content grid: single cell covering the full slide -->
  <div class="gc-grid">
    <div class="content">
      <h1>Talk Title</h1>
      <p class="subtitle">Your subtitle goes here</p>
    </div>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        // e.data.direction: 'forward' | 'backward' | 'initial'
        // trigger enter animations here
      }
      if (e.data?.type === 'slideExit') {
        // clean up / stop timers here
      }
      if (e.data?.type === 'devMode') {
        document.documentElement.classList.toggle('gc-dev', !!e.data.enabled)
      }
    })
  </script>
</body>
</html>
