<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUROC — Distribution</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <link rel="stylesheet" href="../../shared/styles/slide-grid.css" />
  <link rel="stylesheet" href="./dataset-switcher.css" />
  <style>
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2.5rem;
    }

    .title {
      font-size: 2.6rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--theme-color-muted);
      margin-top: 0.4rem;
    }

    .header {
      text-align: center;
    }

    .legend {
      display: flex;
      gap: 2.4rem;
      align-items: center;
      font-size: 1rem;
      color: var(--theme-color-muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .legend-swatch {
      width: 15px;
      height: 15px;
      border-radius: 3px;
    }

    /* Dataset switcher styles are shared in ./dataset-switcher.css */
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="ds-switcher">
    <div class="ds-btns">
      <div class="ds-indicator"></div>
      <button class="ds-btn" data-idx="0">A</button>
      <button class="ds-btn" data-idx="1">B</button>
      <button class="ds-btn" data-idx="2">C</button>
    </div>
    <div class="ds-legend">A – High score<br>B – Regular score<br>C – Low score</div>
  </div>
  <script>(function () { var i = parseInt(localStorage.getItem('auroc_dsIdx') || '0'); document.querySelectorAll('.ds-btn').forEach(function (b) { b.classList.toggle('active', +b.dataset.idx === i) }); var ind = document.querySelector('.ds-indicator'); if (ind) { ind.style.transition = 'none'; ind.style.transform = 'translateX(calc(' + i + '*(2rem + 0.3rem)))'; }; })()</script>

  <div class="gc-grid">
  <div class="content">
    <div class="header">
      <div class="title">Score Distribution</div>
      <div class="subtitle">How positive and negative scores are distributed across the [0, 1] range</div>
    </div>
    <svg id="chart" width="860" height="400" style="overflow:visible;flex-shrink:0"></svg>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--pos)"></div>
        <span id="pos-label">Positives (50 samples)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--neg)"></div>
        <span id="neg-label">Negatives (50 samples)</span>
      </div>
    </div>
  </div>
  </div>

  <script src="../../shared/js/rough.js"></script>
  <script src="../../shared/js/svg-text.js"></script>
  <script type="module">
    import { distributions } from './datasets.js'

    const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim()
    const POS = css('--pos'), NEG = css('--neg')
    const CHART = {
      grid:  css('--chart-grid'),
      axis:  css('--chart-axis'),
      label: css('--chart-label'),
      tick:  css('--chart-tick'),
    }
    const W = 860, H = 400, ml = 50, mr = 22, mt = 22, mb = 52
    const pw = W - ml - mr, ph = H - mt - mb

    // Evaluate pdfFn at `steps+1` points over [0,1], normalize to max=1,
    // return closed area path and open line path as SVG strings.
    function makePaths(pdfFn, steps = 300) {
      const ys = Array.from({ length: steps + 1 }, (_, i) => pdfFn(i / steps))
      const maxY = Math.max(...ys)
      const pts = ys.map((y, i) =>
        `${(ml + (i / steps) * pw).toFixed(1)},${(mt + ph - (y / maxY) * ph).toFixed(1)}`
      )
      return {
        area: `M ${ml},${mt + ph} L ${pts.join(' L ')} L ${ml + pw},${mt + ph} Z`,
        line: `M ${pts.join(' L ')}`,
      }
    }

    // Track rough.js generated groups so animateIn can reference them
    let negAreaG, negLineG, posAreaG, posLineG

    function render(dist) {
      const svg = document.getElementById('chart')
      svg.replaceChildren()

      const rc = rough.svg(svg)
      const posP = makePaths(dist.posPDF)
      const negP = makePaths(dist.negPDF)

      // Horizontal grid lines
      for (let g = 1; g <= 4; g++) {
        const yy = mt + ph - (g / 4) * ph
        svg.appendChild(rc.line(ml, yy, W - mr, yy, {
          stroke: CHART.grid,
          strokeWidth: 1,
          roughness: 0.8,
        }))
      }

      // Area fills (hachure for Excalidraw look) — start hidden
      negAreaG = rc.path(negP.area, {
        stroke: 'none',
        fill: NEG,
        fillStyle: 'hachure',
        fillWeight: 1.5,
        hachureGap: 6,
        roughness: 1,
      })
      negAreaG.style.opacity = '0'
      svg.appendChild(negAreaG)

      posAreaG = rc.path(posP.area, {
        stroke: 'none',
        fill: POS,
        fillStyle: 'hachure',
        fillWeight: 1.5,
        hachureGap: 6,
        roughness: 1,
      })
      posAreaG.style.opacity = '0'
      svg.appendChild(posAreaG)

      // Curve strokes — start hidden
      negLineG = rc.path(negP.line, {
        stroke: NEG,
        strokeWidth: 2.5,
        roughness: 1,
        fill: 'none',
      })
      negLineG.style.opacity = '0'
      svg.appendChild(negLineG)

      posLineG = rc.path(posP.line, {
        stroke: POS,
        strokeWidth: 2.5,
        roughness: 1,
        fill: 'none',
      })
      posLineG.style.opacity = '0'
      svg.appendChild(posLineG)

      // Axes (slightly higher roughness for hand-drawn feel)
      svg.appendChild(rc.line(ml, mt, ml, mt + ph, {
        stroke: CHART.axis,
        strokeWidth: 1.5,
        roughness: 1.2,
      }))
      svg.appendChild(rc.line(ml, mt + ph, W - mr, mt + ph, {
        stroke: CHART.axis,
        strokeWidth: 1.5,
        roughness: 1.2,
      }))

      // X-axis labels (0.0 … 1.0)
      for (let i = 0; i <= 5; i++) {
        const x = ml + (i / 5) * pw
        svg.appendChild(svgText(x, mt + ph + 20, (i / 5).toFixed(1), { fontSize: 13, fill: CHART.tick }))
      }

      // Axis labels
      svg.appendChild(svgText(ml + pw / 2, H - 6, 'Classifier Score', { fontSize: 14, fill: CHART.label }))
      svg.appendChild(svgText(13, mt + ph / 2, 'Density', { fontSize: 14, fill: CHART.label, transform: `rotate(-90,13,${mt + ph / 2})` }))
    }

    function animateIn() {
      // Staggered fade-in: negative curve first, then positive curve
      const DUR = '0.6s'
      const EASE = 'ease-out'

      // Negative curve — area + line fade in together
      negAreaG.style.transition = `opacity ${DUR} ${EASE}`
      negLineG.style.transition = `opacity ${DUR} ${EASE}`
      // Force reflow so transition triggers from opacity 0
      negAreaG.getBoundingClientRect()
      negAreaG.style.opacity = '0.18'
      negLineG.style.opacity = '0.85'

      // Positive curve — staggered by 200ms
      setTimeout(() => {
        posAreaG.style.transition = `opacity ${DUR} ${EASE}`
        posLineG.style.transition = `opacity ${DUR} ${EASE}`
        posAreaG.getBoundingClientRect()
        posAreaG.style.opacity = '0.18'
        posLineG.style.opacity = '0.85'
      }, 200)
    }

    const swBtns = document.querySelectorAll('.ds-btn')
    const ind = document.querySelector('.ds-indicator')
    const posLabel = document.getElementById('pos-label')
    const negLabel = document.getElementById('neg-label')

    function applyIdx(idx, animate = false) {
      localStorage.setItem('auroc_dsIdx', idx)
      swBtns.forEach(b => b.classList.toggle('active', +b.dataset.idx === idx))
      ind.style.transition = animate ? 'transform 0.22s cubic-bezier(0.34,1.56,0.64,1)' : 'none'
      ind.style.transform = `translateX(calc(${idx} * (2rem + 0.3rem)))`
      const dist = distributions[idx]
      render(dist)
      posLabel.textContent = `Positives (${dist.posCount} samples)`
      negLabel.textContent = `Negatives (${dist.negCount} samples)`
      animateIn()
    }

    swBtns.forEach(btn => btn.addEventListener('click', () => applyIdx(+btn.dataset.idx, true)))

    applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
    window.addEventListener('message', e => {
      if (e.data?.type === 'slideEnter') applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
      if (e.data?.type === 'devMode') document.documentElement.classList.toggle('gc-dev', !!e.data.enabled)
    })
  </script>
</body>

</html>
