<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUROC — Distribution</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <link rel="stylesheet" href="../../shared/styles/slide-grid.css" />
  <link rel="stylesheet" href="./dataset-switcher.css" />
  <style>
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2.5rem;
    }

    .title {
      font-size: 2.6rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--theme-color-muted);
      margin-top: 0.4rem;
    }

    .header {
      text-align: center;
    }

    .legend {
      display: flex;
      gap: 2.4rem;
      align-items: center;
      font-size: 1rem;
      color: var(--theme-color-muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .legend-swatch {
      width: 15px;
      height: 15px;
      border-radius: 3px;
    }

    /* Dataset switcher styles are shared in ./dataset-switcher.css */
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="ds-switcher">
    <div class="ds-btns">
      <div class="ds-indicator"></div>
      <button class="ds-btn" data-idx="0">A</button>
      <button class="ds-btn" data-idx="1">B</button>
      <button class="ds-btn" data-idx="2">C</button>
    </div>
    <div class="ds-legend">A – High score<br>B – Regular score<br>C – Low score</div>
  </div>
  <script>(function () { var i = parseInt(localStorage.getItem('auroc_dsIdx') || '0'); document.querySelectorAll('.ds-btn').forEach(function (b) { b.classList.toggle('active', +b.dataset.idx === i) }); var ind = document.querySelector('.ds-indicator'); if (ind) { ind.style.transition = 'none'; ind.style.transform = 'translateX(calc(' + i + '*(2rem + 0.3rem)))'; }; })()</script>

  <div class="gc-grid">
  <div class="content">
    <div class="header">
      <div class="title">Score Distribution</div>
      <div class="subtitle">How positive and negative scores are distributed across the [0, 1] range</div>
    </div>
    <canvas id="chart" style="width:860px;height:400px;flex-shrink:0"></canvas>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--pos)"></div>
        <span id="pos-label">Positives (50 samples)</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:var(--neg)"></div>
        <span id="neg-label">Negatives (50 samples)</span>
      </div>
    </div>
  </div>
  </div>

  <script src="../../shared/js/rough.js"></script>
  <script src="../../shared/js/canvas-text.js"></script>
  <script type="module">
    import { distributions } from './datasets.js'

    const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim()
    const POS = css('--pos'), NEG = css('--neg')
    const CHART = {
      grid:  css('--chart-grid'),
      axis:  css('--chart-axis'),
      label: css('--chart-label'),
      tick:  css('--chart-tick'),
    }
    const W = 860, H = 400, ml = 50, mr = 22, mt = 22, mb = 52
    const pw = W - ml - mr, ph = H - mt - mb

    function setupCanvas(canvas) {
      const dpr = window.devicePixelRatio || 1
      const w = canvas.clientWidth, h = canvas.clientHeight
      canvas.width = w * dpr
      canvas.height = h * dpr
      const ctx = canvas.getContext('2d')
      ctx.scale(dpr, dpr)
      return { ctx, w, h }
    }

    // Evaluate pdfFn at `steps+1` points over [0,1], normalize to max=1,
    // return closed area path and open line path as SVG-style path strings.
    function makePaths(pdfFn, steps = 300) {
      const ys = Array.from({ length: steps + 1 }, (_, i) => pdfFn(i / steps))
      const maxY = Math.max(...ys)
      const pts = ys.map((y, i) =>
        `${(ml + (i / steps) * pw).toFixed(1)},${(mt + ph - (y / maxY) * ph).toFixed(1)}`
      )
      return {
        area: `M ${ml},${mt + ph} L ${pts.join(' L ')} L ${ml + pw},${mt + ph} Z`,
        line: `M ${pts.join(' L ')}`,
      }
    }

    // Animation state — opacity per layer
    const layers = { negArea: 0, negLine: 0, posArea: 0, posLine: 0 }
    const targets = { negArea: 0, negLine: 0, posArea: 0, posLine: 0 }
    let animating = false
    let currentPaths = null

    function render() {
      const canvas = document.getElementById('chart')
      const { ctx } = setupCanvas(canvas)
      const rc = rough.canvas(canvas, { options: { seed: 1 } })

      // Horizontal grid lines
      for (let g = 1; g <= 4; g++) {
        const yy = mt + ph - (g / 4) * ph
        rc.line(ml, yy, W - mr, yy, { stroke: CHART.grid, strokeWidth: 1, roughness: 0.8, seed: 1 })
      }

      if (currentPaths) {
        const { negP, posP } = currentPaths

        // Negative area fill (hachure)
        if (layers.negArea > 0.005) {
          ctx.globalAlpha = layers.negArea
          rc.path(negP.area, { stroke: 'none', fill: NEG, fillStyle: 'hachure', fillWeight: 1.5, hachureGap: 6, roughness: 1, seed: 10 })
        }

        // Positive area fill (hachure)
        if (layers.posArea > 0.005) {
          ctx.globalAlpha = layers.posArea
          rc.path(posP.area, { stroke: 'none', fill: POS, fillStyle: 'hachure', fillWeight: 1.5, hachureGap: 6, roughness: 1, seed: 20 })
        }

        // Negative curve stroke
        if (layers.negLine > 0.005) {
          ctx.globalAlpha = layers.negLine
          rc.path(negP.line, { stroke: NEG, strokeWidth: 2.5, roughness: 1, fill: 'none', seed: 30 })
        }

        // Positive curve stroke
        if (layers.posLine > 0.005) {
          ctx.globalAlpha = layers.posLine
          rc.path(posP.line, { stroke: POS, strokeWidth: 2.5, roughness: 1, fill: 'none', seed: 40 })
        }

        ctx.globalAlpha = 1
      }

      // Axes (drawn on top at full opacity)
      rc.line(ml, mt, ml, mt + ph, { stroke: CHART.axis, strokeWidth: 1.5, roughness: 1.2, seed: 50 })
      rc.line(ml, mt + ph, W - mr, mt + ph, { stroke: CHART.axis, strokeWidth: 1.5, roughness: 1.2, seed: 51 })

      // X-axis tick labels
      for (let i = 0; i <= 5; i++) {
        const x = ml + (i / 5) * pw
        canvasText(ctx, x, mt + ph + 20, (i / 5).toFixed(1), { fontSize: 13, fill: CHART.tick })
      }

      // Axis labels
      canvasText(ctx, ml + pw / 2, H - 6, 'Classifier Score', { fontSize: 14, fill: CHART.label })
      canvasText(ctx, 13, mt + ph / 2, 'Density', { fontSize: 14, fill: CHART.label, transform: `rotate(-90,13,${mt + ph / 2})` })
    }

    function animateIn() {
      // Reset all layers to 0
      for (const k in layers) layers[k] = 0

      // Set targets — neg first
      targets.negArea = 0.18
      targets.negLine = 0.85
      targets.posArea = 0
      targets.posLine = 0

      // Stagger positive curves by 200ms
      setTimeout(() => {
        targets.posArea = 0.18
        targets.posLine = 0.85
      }, 200)

      if (!animating) { animating = true; tick() }
    }

    function tick() {
      let done = true
      for (const k in layers) {
        const diff = targets[k] - layers[k]
        if (Math.abs(diff) > 0.005) {
          layers[k] += diff * 0.12
          done = false
        } else {
          layers[k] = targets[k]
        }
      }
      render()
      if (!done) requestAnimationFrame(tick)
      else animating = false
    }

    const swBtns = document.querySelectorAll('.ds-btn')
    const ind = document.querySelector('.ds-indicator')
    const posLabel = document.getElementById('pos-label')
    const negLabel = document.getElementById('neg-label')

    function applyIdx(idx, animate = false) {
      localStorage.setItem('auroc_dsIdx', idx)
      swBtns.forEach(b => b.classList.toggle('active', +b.dataset.idx === idx))
      ind.style.transition = animate ? 'transform 0.22s cubic-bezier(0.34,1.56,0.64,1)' : 'none'
      ind.style.transform = `translateX(calc(${idx} * (2rem + 0.3rem)))`
      const dist = distributions[idx]
      currentPaths = { negP: makePaths(dist.negPDF), posP: makePaths(dist.posPDF) }
      posLabel.textContent = `Positives (${dist.posCount} samples)`
      negLabel.textContent = `Negatives (${dist.negCount} samples)`
      animateIn()
    }

    swBtns.forEach(btn => btn.addEventListener('click', () => applyIdx(+btn.dataset.idx, true)))

    applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
    window.addEventListener('message', e => {
      if (e.data?.type === 'slideEnter') applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
      if (e.data?.type === 'devMode') document.documentElement.classList.toggle('gc-dev', !!e.data.enabled)
    })
  </script>
</body>

</html>
