<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audience question — demo</title>
  <link rel="stylesheet" href="../../themes/eclipse.css" />
  <link rel="stylesheet" href="../../shared/styles/slide-grid.css" />
  <link rel="stylesheet" href="../../shared/styles/elements.css" />
  <link rel="stylesheet" href="../../shared/styles/blocks.css" />
  <style>

    .content {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    /* Slide layout: qa block with title that reveals alongside the answer */
    .qa-slide {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 2rem;
      margin-top: 1.25rem;
    }
    .qa-slide__title {
      margin: 0;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-0.5rem);
      transition: opacity 0.24s ease-out, transform 0.28s ease-out, visibility 0s linear 0.3s;
    }
    .qa-slide--revealed .qa-slide__title {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      transition-delay: 0s, 0s, 0s;
    }
    @media (prefers-reduced-motion: reduce) {
      .qa-slide__title { transition: none; transform: none; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="gc-grid">
  <div class="content">
    <div class="qa-slide" id="aq-slide">
      <h2 class="gc-slide-title qa-slide__title">Shared audience question</h2>

      <div class="gc-block-stack gc-block-stack--qa" id="aq">
        <div class="gc-block-stack__item gc-block-stack__item--question">
          <span class="gc-block__label">Question</span>
          <p class="gc-block__content">You have ranked predictions and binary labels. What does AUROC measure?</p>
        </div>
        <div class="gc-block-stack__item gc-block-stack__item--answer" id="aq-answer" aria-hidden="true">
          <span class="gc-block__label">Answer</span>
          <p class="gc-block__content">The probability that a random positive ranks above a random negative — the area under the ROC curve.</p>
        </div>
      </div>
    </div>
  </div>
  </div>

  <div class="gc-nav-hint"><kbd>Space</kbd> reveal · <kbd>[</kbd> <kbd>]</kbd> steps</div>

  <script>
    const slideRoot = document.getElementById('aq-slide')
    const root = document.getElementById('aq')
    const answerEl = document.getElementById('aq-answer')
    let step = 0
    const TOTAL = 1

    function sendStepState() {
      window.parent.postMessage(
        { type: 'stepState', canGoBack: step > 0, canGoForward: step < TOTAL, currentStep: step },
        '*'
      )
    }

    function render() {
      const revealed = step >= 1
      root.classList.toggle('gc-block-stack--revealed', revealed)
      slideRoot.classList.toggle('qa-slide--revealed', revealed)
      answerEl.setAttribute('aria-hidden', revealed ? 'false' : 'true')
    }

    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        render()
        sendStepState()
      }
      if (e.data?.type === 'stepRestore') {
        step = Math.max(0, Math.min(TOTAL, e.data.step ?? 0))
        render()
        sendStepState()
      }
      if (e.data?.type === 'stepNext' && step < TOTAL) {
        step++
        render()
        sendStepState()
      }
      if (e.data?.type === 'stepPrev' && step > 0) {
        step--
        render()
        sendStepState()
      }
      if (e.data?.type === 'slideExit') {
        step = 0
        render()
      }
      if (e.data?.type === 'devMode') document.documentElement.classList.toggle('gc-dev', !!e.data.enabled)
    })
  </script>
</body>
</html>
