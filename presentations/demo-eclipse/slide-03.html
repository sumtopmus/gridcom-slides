<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUROC — Scores</title>
  <link rel="stylesheet" href="../../themes/eclipse.css" />
  <link rel="stylesheet" href="../../shared/styles/slide-grid.css" />
  <link rel="stylesheet" href="../../shared/styles/elements.css" />
  <link rel="stylesheet" href="./dataset-switcher.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
    }

    .content-frame {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem clamp(3rem, 6vw, 5.5rem);
      overflow: visible;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      width: max-content;
      transform: scale(var(--fit-scale, 1));
      transform-origin: top center;
    }

    .gc-slide-title { font-size: clamp(2rem, 2.6vw, 2.6rem); }
    .gc-subtitle { font-size: clamp(0.88rem, 1.2vw, 1.05rem); margin-top: 0.35rem; }
    .header { text-align: center; }

    .tables {
      display: flex;
      gap: 1.6rem;
      align-items: flex-start;
    }

    table {
      border-collapse: collapse;
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
    }

    th {
      padding: 0.3rem 0.65rem;
      color: var(--theme-color-muted);
      font-weight: 500;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--theme-border);
      text-align: left;
    }

    td {
      padding: 0.2rem 0.65rem;
      border-bottom: 1px solid var(--chart-row-sep);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .bar-bg {
      background: var(--chart-bar-bg);
      height: 5px;
      border-radius: 3px;
      width: 62px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
    }

    /* Dataset switcher styles are shared in ./dataset-switcher.css */
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="ds-switcher">
    <div class="ds-btns">
      <div class="ds-indicator"></div>
      <button class="ds-btn" data-idx="0">A</button>
      <button class="ds-btn" data-idx="1">B</button>
      <button class="ds-btn" data-idx="2">C</button>
    </div>
    <div class="ds-legend">A – High score<br>B – Regular score<br>C – Low score</div>
  </div>
  <script>(function () { var i = parseInt(localStorage.getItem('auroc_dsIdx') || '0'); document.querySelectorAll('.ds-btn').forEach(function (b) { b.classList.toggle('active', +b.dataset.idx === i) }); var ind = document.querySelector('.ds-indicator'); if (ind) { ind.style.transition = 'none'; ind.style.transform = 'translateX(calc(' + i + '*(2rem + 0.3rem)))'; }; })()</script>

  <div class="gc-grid">
  <div class="content-frame">
    <div class="content" id="content">
    <div class="header">
      <div class="gc-slide-title">Classifier Scores</div>
      <div class="gc-subtitle">All 100 samples ranked by score — higher score = model is more confident the sample is
        positive</div>
    </div>
    <div class="tables" id="tables"></div>
    </div>
  </div>
  </div>

  <script type="module">
    import { datasets } from './datasets.js'

    const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim()
    const col = l => l === 1 ? css('--pos') : css('--neg')
    const sym = l => l === 1 ? '●' : '×'

    const hdr = () => `<thead><tr><th>#</th><th>Sample</th><th>Class</th><th>Score</th><th></th></tr></thead>`
    const row = (d, rank) => `<tr>
      <td style="color:var(--theme-color-muted);font-size:0.68rem">${rank}</td>
      <td style="color:var(--theme-color-muted)">S${String(d.id).padStart(3, '0')}</td>
      <td style="font-weight:700;color:${col(d.label)};text-align:center">${sym(d.label)}</td>
      <td style="color:${col(d.label)};font-weight:600">${d.score.toFixed(2)}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${d.score * 100}%;background:${col(d.label)}"></div></div></td>
    </tr>`

    const tablesEl = document.getElementById('tables')
    const contentEl = document.getElementById('content')

    function fitContent() {
      contentEl.style.setProperty('--fit-scale', '1')
      const available = document.body.clientWidth - 4
      const natural = contentEl.scrollWidth
      const scale = natural > 0 ? Math.min(1, available / natural) : 1
      contentEl.style.setProperty('--fit-scale', String(scale))
    }

    function render(data) {
      tablesEl.innerHTML = ''
      for (let c = 0; c < 4; c++) {
        const slice = data.slice(c * 25, c * 25 + 25)
        const offset = c * 25
        const t = document.createElement('table')
        t.innerHTML = hdr() + `<tbody>${slice.map((d, i) => row(d, offset + i + 1)).join('')}</tbody>`
        tablesEl.appendChild(t)
      }
      animateIn()
      requestAnimationFrame(fitContent)
    }

    function animateIn() {
      document.querySelectorAll('tr').forEach((tr, i) => {
        tr.style.opacity = '0'
        tr.style.transform = 'translateX(-8px)'
        tr.style.transition = 'none'
        void tr.offsetWidth
        tr.style.transition = `opacity 0.22s ease ${i * 0.009}s, transform 0.22s ease ${i * 0.009}s`
        tr.style.opacity = '1'
        tr.style.transform = 'translateX(0)'
      })
    }

    let dsIdx = 0
    const swBtns = document.querySelectorAll('.ds-btn')
    const ind = document.querySelector('.ds-indicator')

    function applyIdx(idx, animate = false) {
      dsIdx = idx
      localStorage.setItem('auroc_dsIdx', idx)
      swBtns.forEach(b => b.classList.toggle('active', +b.dataset.idx === idx))
      ind.style.transition = animate ? 'transform 0.22s cubic-bezier(0.34,1.56,0.64,1)' : 'none'
      ind.style.transform = `translateX(calc(${idx} * (2rem + 0.3rem)))`
      render(datasets[idx].data)
    }

    swBtns.forEach(btn => {
      btn.addEventListener('click', () => applyIdx(+btn.dataset.idx, true))
    })

    applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
    window.addEventListener('message', e => {
      if (e.data?.type === 'slideEnter') applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
      if (e.data?.type === 'devMode') document.documentElement.classList.toggle('gc-dev', !!e.data.enabled)
    })
    window.addEventListener('resize', fitContent)
  </script>
</body>

</html>
