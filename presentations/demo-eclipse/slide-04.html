<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUROC — ROC Curve</title>
  <link rel="stylesheet" href="../../themes/eclipse.css" />
  <link rel="stylesheet" href="../../shared/styles/slide-grid.css" />
  <link rel="stylesheet" href="./dataset-switcher.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --item-h: 58px;
    }

    body {
      overflow: hidden;
      color: var(--theme-color);
    }

    /* ── Header row ── */
    .top {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .top-title {
      text-align: center;
    }

    .tag {
      font-size: 1.05rem;
      color: var(--theme-color-muted);
      margin-bottom: 0.35rem;
    }

    .title {
      font-size: 2.6rem;
    }

    /* Dataset switcher styles are shared in ./dataset-switcher.css */

    .stats {
      display: flex;
      gap: 0.7rem;
      align-items: center;
      justify-content: flex-end;
    }

    .stat {
      background: var(--theme-surface);
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      padding: 0.38rem 0.8rem;
      min-width: 6rem;
    }

    .stat-label {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--theme-color-muted);
      margin-bottom: 0.1rem;
    }

    .stat-value {
      font-size: 0.95rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }


    .list-label {
      font-size: 1.1rem;
      color: var(--chart-label);
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Slot machine ── */
    .slot-clip {
      min-height: 0;
      position: relative;
      overflow: visible;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 0.3rem;
      padding: 4rem 4rem 0;
    }

    .slot-content-wrapper {
      position: relative;
    }

    .slot-content-clip {
      position: relative;
      width: 100%;
      height: calc(var(--item-h) * 7);
      overflow: hidden;
      mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
    }

    .slot-highlight {
      position: absolute;
      left: -1.5rem;
      right: -1.5rem;
      top: 50%;
      height: var(--item-h);
      transform: translateY(-50%);
      border: 1px solid var(--theme-accent);
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.07);
      /* lighter tint than --theme-accent-subtle */
      z-index: 1;
      pointer-events: none;
    }

    .slot-inner {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      transition: transform 0.26s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .slot-item {
      height: var(--item-h);
      display: grid;
      grid-template-columns: max-content max-content 1fr;
      align-items: center;
      padding: 0 2.5rem;
      min-width: 380px;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      transition: opacity 0.18s;
    }

    .slot-item.empty {
      opacity: 0;
      pointer-events: none;
    }

    .slot-item.done {
      opacity: 0.22;
    }

    .slot-item.current {
      opacity: 1;
    }

    .slot-item.pending {
      opacity: 0.48;
    }

    .slot-rank {
      text-align: right;
      font-size: 0.82rem;
      color: var(--theme-color-muted);
      padding-right: 0.45rem;
    }

    .slot-core {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .slot-sym {
      font-size: 1.15rem;
    }

    .slot-score {
      color: var(--theme-color-muted);
      font-size: 0.9rem;
    }

    .slot-dir {
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* ── Plot panel ── */
    .plot-panel {
      min-height: 0;
      overflow: visible;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-width: 0;
    }

    #roc-svg {
      width: clamp(560px, 74vh, 860px);
      aspect-ratio: 1;
      height: auto;
      display: block;
      overflow: visible;
    }

    /* ── Nav hint ── */
    .nav-hint {
      position: fixed;
      bottom: 4.8rem;
      right: 2.8rem;
      font-size: 0.7rem;
      color: var(--theme-color-muted);
      opacity: 0.7;
      z-index: 100;
      letter-spacing: 0.03em;
    }

    .nav-hint kbd {
      font-family: inherit;
      background: var(--theme-surface);
      border: 1px solid var(--theme-border);
      border-radius: 4px;
      padding: 0.1rem 0.42rem;
      font-size: 0.64rem;
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="ds-switcher">
    <div class="ds-btns">
      <div class="ds-indicator"></div>
      <button class="ds-btn" data-idx="0">A</button>
      <button class="ds-btn" data-idx="1">B</button>
      <button class="ds-btn" data-idx="2">C</button>
    </div>
    <div class="ds-legend">A – High score<br>B – Regular score<br>C – Low score</div>
  </div>
  <script>(function () { var i = parseInt(localStorage.getItem('auroc_dsIdx') || '0'); document.querySelectorAll('.ds-btn').forEach(function (b) { b.classList.toggle('active', +b.dataset.idx === i) }); var ind = document.querySelector('.ds-indicator'); if (ind) { ind.style.transition = 'none'; ind.style.transform = 'translateX(calc(' + i + '*(2rem + 0.3rem)))'; }; })()</script>

  <!-- 3×3 gc-grid: row 1 = header (spans all cols), row 2 = stats (col 2, right), row 3 = slot + plot + empty -->
  <div class="gc-grid"
    style="--gc-cols: max-content auto 1fr; --gc-rows: auto auto 1fr; --gc-padding: 1.5rem clamp(4rem, 10vw, 9rem) 2.2rem clamp(7rem, 16vw, 15rem); --gc-gap: 0.9rem clamp(1.2rem, 3vw, 2.6rem)">
    <div class="top" style="grid-column: 1 / 4; grid-row: 1">
      <div class="top-title">
        <div class="tag">Sweep threshold from high → low</div>
        <div class="title">ROC Curve Construction</div>
      </div>
    </div>
    <div class="stats" id="stats" style="grid-column: 2; grid-row: 2"></div>
    <div class="slot-clip" style="grid-column: 1; grid-row: 3">
      <div class="list-label">Samples sorted by score ↓</div>
      <div class="slot-content-wrapper">
        <div class="slot-highlight"></div>
        <div class="slot-content-clip">
          <div class="slot-inner" id="slot-inner"></div>
        </div>
      </div>
    </div>
    <div class="plot-panel" style="grid-column: 2; grid-row: 3">
      <svg id="roc-svg"></svg>
    </div>
  </div>

  <div class="nav-hint"><kbd>[</kbd> prev step &nbsp; next step <kbd>]</kbd></div>

  <script src="../../shared/js/rough.js"></script>
  <script src="../../shared/js/svg-text.js"></script>
  <script type="module">
    import { datasets } from './datasets.js'

    const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim()
    const POS = css('--pos'), NEG = css('--neg'), CURVE = css('--theme-accent')
    const CHART = {
      grid: css('--chart-grid'),
      axis: css('--chart-axis'),
      label: css('--chart-label'),
      tick: css('--chart-tick'),
      ref: css('--chart-ref'),
      refLabel: css('--chart-ref-label'),
      dotIdle: css('--chart-dot-idle'),
      dotStroke: css('--chart-dot-stroke'),
      badgeBg: css('--chart-badge-bg'),
      area: css('--chart-area'),
    }
    const ITEM_H = 58
    const PREFIX = 3

    const slotClip = document.querySelector('.slot-content-clip')
    const slotInner = document.getElementById('slot-inner')

    const emptySlot = () => '<div class="slot-item empty"><span class="slot-rank"></span><div class="slot-core"><span class="slot-sym"></span><span class="slot-score"></span><span class="slot-dir"></span></div><span></span></div>'

    // ── Per-dataset state ──────────────────────────────────
    let sorted, N_POS, N_NEG, N, rocPts
    let step = 0

    function loadDataset(data) {
      sorted = data
      N = sorted.length
      N_POS = sorted.filter(d => d.label === 1).length
      N_NEG = sorted.filter(d => d.label === 0).length

      // Precompute all N+1 ROC points
      rocPts = [{ fpr: 0, tpr: 0, auroc: 0 }]
      let _tp = 0, _fp = 0, _auc = 0
      for (const d of sorted) {
        if (d.label === 1) { _tp++ }
        else { _auc += (_tp / N_POS) * (1 / N_NEG); _fp++ }
        rocPts.push({ fpr: _fp / N_NEG, tpr: _tp / N_POS, auroc: _auc })
      }

      // Rebuild slot strip
      let html = emptySlot() + emptySlot() + emptySlot()
      for (let i = 0; i < N; i++) {
        const d = sorted[i]
        const col = d.label === 1 ? POS : NEG
        html += `<div class="slot-item pending">
          <span class="slot-rank">${i + 1}. S${String(d.id).padStart(3, '0')}</span>
          <div class="slot-core">
            <span class="slot-sym" style="color:${col}">${d.label === 1 ? '●' : '×'}</span>
            <span class="slot-score">${d.score.toFixed(2)}</span>
            <span class="slot-dir"></span>
          </div>
          <span></span>
        </div>`
      }
      html += emptySlot() + emptySlot() + emptySlot()
      slotInner.innerHTML = html

      step = 0
      update(0)
    }

    function update(s, instant = false) {
      step = s

      const clipH = slotClip.clientHeight
      if (instant) slotInner.style.transition = 'none'
      slotInner.style.transform = `translateY(${clipH / 2 - (s + PREFIX - 0.5) * ITEM_H}px)`
      if (instant) requestAnimationFrame(() => { slotInner.style.transition = '' })

      const items = slotInner.children
      for (let i = 0; i < N; i++) {
        const el = items[i + PREFIX]
        const dir = el.querySelector('.slot-dir')
        const label = sorted[i].label
        dir.textContent = label === 1 ? '↑ TPR' : '→ FPR'
        dir.style.color = label === 1 ? POS : NEG
        if (i < s - 1) el.className = 'slot-item done'
        else if (i === s - 1) el.className = 'slot-item current'
        else el.className = 'slot-item pending'
      }

      const pt = rocPts[s]
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-label">Step</div><div class="stat-value">${s}&thinsp;/&thinsp;${N}</div></div>
        <div class="stat"><div class="stat-label">FPR</div><div class="stat-value" style="color:${NEG}">${pt.fpr.toFixed(2)}</div></div>
        <div class="stat"><div class="stat-label">TPR</div><div class="stat-value" style="color:${POS}">${pt.tpr.toFixed(2)}</div></div>
        <div class="stat"><div class="stat-label">AUROC</div><div class="stat-value" style="color:${CURVE}">${s === 0 ? '—' : pt.auroc.toFixed(3)}</div></div>
      `

      drawROC(s)
    }

    function drawROC(s) {
      const svg = document.getElementById('roc-svg')
      const W = svg.clientWidth, H = svg.clientHeight
      if (!W || !H) return
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`)

      svg.replaceChildren()
      const rc = rough.svg(svg)

      const ml = 80, mr = 24, mt = 24, mb = 88
      const pw = W - ml - mr, ph = H - mt - mb
      const tx = fpr => ml + fpr * pw
      const ty = tpr => mt + ph - tpr * ph

      // Grid lines + tick labels
      for (let i = 0; i <= 5; i++) {
        const v = i / 5, gx = tx(v), gy = ty(v)
        svg.appendChild(rc.line(gx, mt, gx, mt + ph, { stroke: CHART.grid, strokeWidth: 1, roughness: 0.6 }))
        svg.appendChild(rc.line(ml, gy, ml + pw, gy, { stroke: CHART.grid, strokeWidth: 1, roughness: 0.6 }))
        svg.appendChild(svgText(gx, mt + ph + 32, v.toFixed(1), { fontSize: 15, fill: CHART.tick }))
        svg.appendChild(svgText(ml - 18, gy + 5, v.toFixed(1), { fontSize: 15, fill: CHART.tick, anchor: 'end' }))
      }

      // Axes
      svg.appendChild(rc.line(ml, mt, ml, mt + ph, { stroke: CHART.axis, strokeWidth: 3, roughness: 0.8 }))
      svg.appendChild(rc.line(ml, mt + ph, ml + pw, mt + ph, { stroke: CHART.axis, strokeWidth: 3, roughness: 0.8 }))

      // Axis labels
      svg.appendChild(svgText(ml + pw / 2, H - 8, 'False Positive Rate (FPR)', { fontSize: 24, fill: CHART.label }))
      svg.appendChild(svgText(18, mt + ph / 2, 'True Positive Rate (TPR)', { fontSize: 24, fill: CHART.label, transform: `rotate(-90,18,${mt + ph / 2})` }))

      // Diagonal reference line
      svg.appendChild(rc.line(tx(0), ty(0), tx(1), ty(1), { stroke: CHART.ref, strokeWidth: 2, roughness: 1, strokeLineDash: [9, 6] }))
      const refAngle = Math.atan2(-ph, pw) * 180 / Math.PI
      svg.appendChild(svgText(tx(0.66), ty(0.62), 'Random (0.50)', { fontSize: 18, fill: CHART.refLabel, transform: `rotate(${refAngle},${tx(0.66)},${ty(0.62)})` }))

      if (s > 0) {
        const pts = rocPts.slice(0, s + 1)
        const last = pts[pts.length - 1]

        // Area fill under ROC curve
        let areaPath = `M ${tx(0)} ${ty(0)}`
        for (const p of pts) areaPath += ` L ${tx(p.fpr)} ${ty(p.tpr)}`
        areaPath += ` L ${tx(last.fpr)} ${ty(0)} Z`
        svg.appendChild(rc.path(areaPath, { fill: CHART.area, fillStyle: 'hachure', fillWeight: 1, hachureGap: 6, stroke: 'none', roughness: 0.8 }))

        // Colored curve segments
        for (let i = 1; i <= s; i++) {
          const from = rocPts[i - 1], to = rocPts[i]
          const segCol = sorted[i - 1].label === 1 ? POS : NEG
          const segmentPath = `M ${tx(from.fpr)} ${ty(from.tpr)} L ${tx(to.fpr)} ${ty(to.tpr)}`
          svg.appendChild(rc.path(segmentPath, { stroke: segCol, strokeWidth: 2.5, roughness: 0.8, fill: 'none' }))
        }

        // Intermediate dots
        for (let i = 1; i < s; i++) {
          if (i % 2 === 0 || rocPts[i].fpr !== rocPts[i - 1].fpr || rocPts[i].tpr !== rocPts[i - 1].tpr) {
            const p = rocPts[i]
            const dotCol = sorted[i - 1].label === 1 ? POS : NEG
            svg.appendChild(rc.circle(tx(p.fpr), ty(p.tpr), 10, { fill: dotCol, stroke: 'none', fillStyle: 'solid', roughness: 0.5 }))
          }
        }

        // Current point dot
        const cur = rocPts[s]
        const curCol = sorted[s - 1].label === 1 ? POS : NEG
        svg.appendChild(rc.circle(tx(cur.fpr), ty(cur.tpr), 16, { fill: curCol, stroke: CHART.dotStroke, strokeWidth: 2, roughness: 0.5 }))

        // Coordinate label
        if (s < N) {
          const lx = cur.fpr > 0.72 ? tx(cur.fpr) - 10 : tx(cur.fpr) + 10
          const ly = cur.tpr > 0.88 ? ty(cur.tpr) + 18 : ty(cur.tpr) - 12
          const anchor = cur.fpr > 0.72 ? 'end' : 'start'
          svg.appendChild(svgText(lx, ly, `(${cur.fpr.toFixed(2)}, ${cur.tpr.toFixed(2)})`, { fontSize: 15, fill: CURVE, anchor, opacity: 0.88 }))
        }

        // Final AUROC badge
        if (s === N) {
          const cx = tx(0.5), cy = ty(0.2)
          svg.appendChild(rc.rectangle(cx - 110, cy - 23, 220, 46, { fill: CHART.badgeBg, stroke: CURVE, strokeWidth: 1.8, roughness: 1 }))
          svg.appendChild(svgText(cx, cy, `AUROC = ${rocPts[N].auroc.toFixed(3)}`, { fontSize: 24, fill: CURVE, fontWeight: '700', dy: '0.35em' }))
        }
      } else {
        svg.appendChild(rc.circle(tx(0), ty(0), 16, { fill: CHART.dotIdle, stroke: CHART.dotIdle, strokeWidth: 2, roughness: 0.5 }))
      }
    }

    // ── Switcher ──────────────────────────────────────────
    const swBtns = document.querySelectorAll('.ds-btn')
    const ind = document.querySelector('.ds-indicator')

    function applyIdx(idx, animate = false) {
      localStorage.setItem('auroc_dsIdx', idx)
      swBtns.forEach(b => b.classList.toggle('active', +b.dataset.idx === idx))
      ind.style.transition = animate ? 'transform 0.22s cubic-bezier(0.34,1.56,0.64,1)' : 'none'
      ind.style.transform = `translateX(calc(${idx} * (2rem + 0.3rem)))`
      loadDataset(datasets[idx].data)
      sendStepState()
    }

    swBtns.forEach(btn => {
      btn.addEventListener('click', () => applyIdx(+btn.dataset.idx, true))
    })

    // ── Viewer lifecycle ──────────────────────────────────
    function sendStepState() {
      window.parent.postMessage({ type: 'stepState', canGoBack: step > 0, canGoForward: step < N, currentStep: step }, '*')
    }

    window.addEventListener('message', e => {
      if (e.data?.type === 'slideEnter') { applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0')); sendStepState() }
      if (e.data?.type === 'stepRestore') { update(Math.max(0, Math.min(N, e.data.step ?? 0)), true); sendStepState() }
      if (e.data?.type === 'stepNext' && step < N) { update(step + 1); sendStepState() }
      if (e.data?.type === 'stepPrev' && step > 0) { update(step - 1); sendStepState() }
      if (e.data?.type === 'devMode') document.documentElement.classList.toggle('gc-dev', !!e.data.enabled)
    })

    // ── Init ──────────────────────────────────────────────
    applyIdx(parseInt(localStorage.getItem('auroc_dsIdx') ?? '0'))
    window.addEventListener('load', () => update(step))
    let resizeRAF = 0
    new ResizeObserver(() => { cancelAnimationFrame(resizeRAF); resizeRAF = requestAnimationFrame(() => drawROC(step)) }).observe(document.getElementById('roc-svg'))
  </script>
</body>

</html>
