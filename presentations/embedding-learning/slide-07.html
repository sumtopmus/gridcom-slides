<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component vs. Standalone Embeddings</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <link rel="stylesheet" href="../../shared/styles/slide-grid.css" />
  <style>
    .content {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="gc-grid">
    <div class="content">
      <img src="assets/fig3.svg" alt="Component vs. standalone embeddings diagram" />
    </div>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'devMode') {
        document.documentElement.classList.toggle('gc-dev', !!e.data.enabled)
      }
    })
  </script>
</body>
</html>
