<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Title Slide</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      background: #09090b;
      color: #fafafa;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated gradient background */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(99,102,241,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 75% 65%, rgba(139,92,246,0.12) 0%, transparent 55%),
        #09090b;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: 0.8; }
      to { opacity: 1; }
    }

    /* Grid lines */
    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 800px;
    }

    .eyebrow {
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(10px);
    }

    h1 {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.0;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fafafa 30%, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(16px);
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: #71717a;
      font-weight: 400;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(12px);
    }

    .meta {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: #52525b;
      opacity: 0;
    }

    .meta-sep { color: #27272a; }

    /* Slide-in animation */
    .animate { animation: slideUp 0.6s ease forwards; }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content">
    <p class="eyebrow">Presentation Platform</p>
    <h1>HTML Slides,<br>Unlimited Power</h1>
    <p class="subtitle">Author rich, interactive presentations in raw HTML, CSS &amp; TypeScript.<br>No framework lock-in. Full creative control.</p>
    <div class="meta">
      <span>Demo Presentation</span>
      <span class="meta-sep">·</span>
      <span>March 2026</span>
      <span class="meta-sep">·</span>
      <span>3 slides</span>
    </div>
  </div>

  <script>
    function animateIn() {
      const els = document.querySelectorAll('.eyebrow, h1, .subtitle, .meta')
      els.forEach((el, i) => {
        el.style.animationDelay = `${i * 0.12}s`
        el.classList.add('animate')
      })
    }

    // Animate on load, re-animate on slideEnter
    window.addEventListener('load', animateIn)
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        document.querySelectorAll('.eyebrow, h1, .subtitle, .meta').forEach(el => {
          el.classList.remove('animate')
          // Force reflow
          void el.offsetWidth
          el.classList.add('animate')
        })
      }
    })
  </script>
</body>
</html>
